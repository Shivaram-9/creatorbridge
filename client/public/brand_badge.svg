<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for Outer Seal -->
    <linearGradient id="gold-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF1D5"/>
      <stop offset="30%" stop-color="#D6A962"/>
      <stop offset="70%" stop-color="#C09249"/>
      <stop offset="100%" stop-color="#8D6222"/>
    </linearGradient>

    <!-- Gold Gradient for Inner Rim -->
    <linearGradient id="gold-inner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2D7A5"/>
      <stop offset="50%" stop-color="#D6A962"/>
      <stop offset="100%" stop-color="#A67B34"/>
    </linearGradient>

    <!-- Gradient for the center circle (soft ivory/gold) -->
    <linearGradient id="center-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCF6E9"/>
      <stop offset="100%" stop-color="#F3E5C7"/>
    </linearGradient>

    <!-- Star gradients (3D effect) -->
    <!-- Left/Top faces (lighter) -->
    <linearGradient id="star-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF1D5"/>
      <stop offset="100%" stop-color="#D0A45B"/>
    </linearGradient>
    
    <!-- Right/Bottom faces (darker) -->
    <linearGradient id="star-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BA873B"/>
      <stop offset="100%" stop-color="#7A5216"/>
    </linearGradient>

    <!-- Subtle Drop Shadow for entire badge -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Star Shadow -->
    <filter id="star-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#5a3d0f" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer scalloped seal -->
  <polygon points="50.00,4.00 62.36,11.96 77.04,12.79 82.36,26.49 93.75,35.79 90.00,50.00 93.75,64.21 82.36,73.51 77.04,87.21 62.36,88.04 50.00,96.00 37.64,88.04 22.96,87.21 17.64,73.51 6.25,64.21 10.00,50.00 6.25,35.79 17.64,26.49 22.96,12.79 37.64,11.96" fill="url(#gold-outer)" stroke="url(#gold-outer)" stroke-width="8" stroke-linejoin="round" filter="url(#drop-shadow)" />

  <!-- Inner circle rings to create depth -->
  <circle cx="50" cy="50" r="35" fill="url(#gold-inner)" />
  <circle cx="50" cy="50" r="33" fill="url(#gold-outer)" />
  <circle cx="50" cy="50" r="32" fill="url(#center-bg)" />
  
  <!-- Subtle line accent inside the ivory circle -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#gold-inner)" stroke-width="0.5" opacity="0.6" />

  <!-- The 4-point compass star with 3D embossed styling -->
  <g filter="url(#star-shadow)">
    <!-- Top point -->
    <polygon points="50,22 56,44 50,50" fill="url(#star-light)" />
    <polygon points="50,22 44,44 50,50" fill="url(#star-dark)" />
    
    <!-- Right point -->
    <polygon points="78,50 56,44 50,50" fill="url(#star-light)" />
    <polygon points="78,50 56,56 50,50" fill="url(#star-dark)" />
    
    <!-- Bottom point -->
    <polygon points="50,78 56,56 50,50" fill="url(#star-light)" />
    <polygon points="50,78 44,56 50,50" fill="url(#star-dark)" />
    
    <!-- Left point -->
    <polygon points="22,50 44,44 50,50" fill="url(#star-light)" />
    <polygon points="22,50 44,56 50,50" fill="url(#star-dark)" />
  </g>
</svg>
